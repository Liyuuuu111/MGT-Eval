# attacks_config example (YAML for readability)
# NOTE: dataset_builder currently expects JSON for --attacks_config.
#       Convert this YAML to JSON before use.

text_attacks:
  # --- span (Span Perturbation / T5 mask filling) ---
  - type: span
    # mask filling model (HF id or local dir)
    model: t5-large
    pct_words_masked: 0.6
    span_length: 2
    buffer_size: 1
    mask_top_p: 1.0
    chunk_size: 20
    n_variants: 1
    device: cuda
    cache_dir: null
    dtype: bf16

  # --- para (Paraphrase) - pegasus backend ---
  - type: para
    backend: pegasus
    model: tuner007/pegasus_paraphrase
    top_p: 0.96
    temperature: 1.0
    max_length: 60
    sent_batch_size: 64
    n_variants: 1
    device: cuda
    cache_dir: null
    dtype: bf16

  # --- para (Paraphrase) - dipper backend ---
  - type: para
    backend: dipper
    model: kalpeshk2011/dipper-paraphraser-xxl
    lex_diversity: 60
    order_diversity: 60
    n_variants: 1
    device: cuda
    dtype: bf16

  # --- para (Paraphrase) - hf prompt backend ---
  - type: para
    backend: hf
    model: google/flan-t5-large
    max_new_tokens: 256
    temperature: 0.9
    top_p: 0.95
    do_sample: true
    n_variants: 1
    device: cuda
    cache_dir: null
    dtype: bf16
    system_prompt: |
      You are a ruthless paraphraser. You will aggressively and completely rewrite the user's text while preserving the core meaning and factual content. Keep the SAME LANGUAGE as the input. Do NOT add disclaimers, meta-comments, safety notes, citations, or new facts. Do NOT shorten excessively; keep roughly similar length unless instructed otherwise. Produce ONLY the rewritten text as plain text, with no surrounding quotes or markers.

  # --- para (Paraphrase) - api backend ---
  - type: para
    backend: api
    model: deepseek-chat
    base_url: https://api.deepseek.com
    api_key: ""
    system_prompt: |
      You are a ruthless paraphraser. You will aggressively and completely rewrite the user's text while preserving the core meaning and factual content. Keep the SAME LANGUAGE as the input. Do NOT add disclaimers, meta-comments, safety notes, citations, or new facts. Do NOT shorten excessively; keep roughly similar length unless instructed otherwise. Produce ONLY the rewritten text as plain text, with no surrounding quotes or markers.
    temperature: 0.9
    max_tokens: 1024
    timeout: 60.0
    retries: 5
    sleep: 0.2
    n_variants: 1

  # --- para (Paraphrase) - chatgpt backend ---
  - type: para
    backend: chatgpt
    model: deepseek-chat
    base_url: https://api.deepseek.com
    api_key: ""
    system_prompt: |
      You are a ruthless paraphraser. You will aggressively and completely rewrite the user's text while preserving the core meaning and factual content. Keep the SAME LANGUAGE as the input. Do NOT add disclaimers, meta-comments, safety notes, citations, or new facts. Do NOT shorten excessively; keep roughly similar length unless instructed otherwise. Produce ONLY the rewritten text as plain text, with no surrounding quotes or markers.
    temperature: 0.9
    max_tokens: 1024
    timeout: 60.0
    retries: 5
    sleep: 0.2
    n_variants: 1

  # --- typo (Typo attack, mixed) ---
  - type: typo
    mode: mix  # mix | insert | delet | subst | trans | inse | dele | subs | tran
    pct_words_masked: 0.6
    n_variants: 1

  # --- inse (Typo meta-attack: insertion only) ---
  - type: inse
    pct_words_masked: 0.6
    n_variants: 1

  # --- dele (Typo meta-attack: deletion only) ---
  - type: dele
    pct_words_masked: 0.6
    n_variants: 1

  # --- subs (Typo meta-attack: substitution only) ---
  - type: subs
    pct_words_masked: 0.6
    n_variants: 1

  # --- tran (Typo meta-attack: transposition only) ---
  - type: tran
    pct_words_masked: 0.6
    n_variants: 1

  # --- homo (Homoglyph Alteration / VIPER) ---
  - type: homo
    variant: ECES  # ECES | ICES
    pct_words_masked: 0.6
    n_variants: 1

  # --- form (Format Character Editing) ---
  - type: form
    variant: zero-sp  # zero-sp | shift-u
    pct_words_masked: 0.6
    n_variants: 1

  # --- syno (Synonym Substitution) - modelfree ---
  - type: syno
    backend: modelfree
    pct_words_masked: 0.6
    n_variants: 1

  # --- syno (Synonym Substitution) - modelbase ---
  - type: syno
    backend: modelbase
    model: gpt2
    pct_words_masked: 0.6
    num_replacement_retry: 3
    n_variants: 1
    device: cuda
    dtype: bf16
    cache_dir: null

  # --- back_trans (Back Translation) ---
  - type: back_trans
    pivot_lang: auto        # auto | en | de | ...
    src_lang: null          # optional explicit src lang
    pivot_for_en: de        # used when pivot_lang=auto
    pivot_for_non_en: en    # used when pivot_lang=auto
    n_rounds: 1
    n_variants: 1
    num_beams: 5
    do_sample: false
    temperature: 1.0
    top_p: 1.0
    max_length: 512
    device: cuda
    cache_dir: null
    dtype: bf16

  # --- humanize (Anthropomorphic rewrite) - api backend ---
  - type: humanize
    backend: api
    attack_dataset_path: data/arxiv.llama32_3b.train.jsonl
    n_pairs: 3
    max_input_tokens: 4096
    max_output_tokens: 512
    temperature: 0.9
    top_p: 0.95
    n_variants: 1
    model: deepseek-chat
    base_url: https://api.deepseek.com
    api_key: ""
    top_k: null
    frequency_penalty: 0.0
    presence_penalty: 0.0
    timeout: 60.0
    retries: 5
    sleep: 0.2

  # --- humanize (Anthropomorphic rewrite) - hf backend ---
  - type: humanize
    backend: hf
    attack_dataset_path: data/arxiv.llama32_3b.train.jsonl
    n_pairs: 3
    max_input_tokens: 4096
    max_output_tokens: 512
    temperature: 0.9
    top_p: 0.95
    n_variants: 1
    model: google/flan-t5-large
    do_sample: true
    top_k: 50
    device: cuda
    cache_dir: null
    dtype: bf16
    use_vllm: true
    vllm_batch_size: 1
    vllm_gpu_memory_utilization: 0.9
    vllm_max_model_len: null
    vllm_dtype: null
    vllm_tensor_parallel_size: 1
    vllm_enforce_eager: false
    vllm_trust_remote_code: false
    vllm_disable_log_stats: true

regen_attacks:
  # --- temp_sweep (regen attack) ---
  - type: temp_sweep
    temps: [0.3, 0.7, 1.2]

  # --- top_p_sweep (regen attack) ---
  - type: top_p_sweep
    top_ps: [0.8, 0.9, 1.0]

  # --- greedy_vs_sample (regen attack) ---
  - type: greedy_vs_sample
    sample_temperature: 1.1
