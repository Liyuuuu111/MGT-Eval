# Attack-only dataset build (no generation). 
# ：“/”，
# ：mgteval-cli attack mgt_eval/examples/attack/build_attack_dataset.yaml

# ===== / =====
# data: （json/jsonl  load_dataset_unified  spec）
data: data/arxiv.qwen3_4b.test.jsonl
# out: （jsonl）
out: data/attack/arxiv.qwen3_4b.test.attack.jsonl

# =====  =====
# attacks_config: （JSON） examples/attack/attacks_all.json
attacks_config: examples/attack/attacks_example.json

# ===== attack-only  =====
# attack_dataset_only: 1=，
attack_dataset_only: 1
# only_attack_machine: 1= label==machine_label ；0=
only_attack_machine: 1
# machine_label: “”（ 1）
machine_label: 1
# sample_k:  K （None/<=0 ）
sample_k: 0

# ===== prompt / prefix （attack-only  prompt/original ） =====
# prompt_from_label:  prompt/original ； prompt
prompt_from_label: 0
# only_human_prompts: 1= label=0 (human)  prompt
only_human_prompts: 1
# max_prompts:  prompt （attack-only ）
max_prompts: null
# seed: （）
seed: 114514

# stop: JSON list string，: '["\n\n"]'
stop: null
# return_full_text: 1=prompt+completion, 0= completion
return_full_text: 1
presence_penalty: 0.0
frequency_penalty: 0.0
