data: data/arxiv.llama32_3b.train.jsonl
out: data/arxiv.llama32_3b.train.build.jsonl

# Choose the prompt that generate MGT
prompt_from_label: 0
only_human_prompts: 1
max_prompts: 0
seed: 114514

prefix_k_tokens: 64
tokenizer_strategy: auto
prompt_template: "{prefix}"
system_prompt: null
machine_text_mode: prompt_plus

max_new_tokens: 128
min_new_tokens: 0
do_sample: 1
temperature: 0.8
top_p: 0.95
top_k: 0
num_beams: 1
repetition_penalty: 1.0
no_repeat_ngram_size: 0
stop: null
return_full_text: 1
presence_penalty: 0.0
frequency_penalty: 0.0

attacks_config: null
attack_types: null
attacks: null

# ===== backend =====
backend: hf
hf_model: meta-llama/Llama-3.2-3B-Instruct
hf_device: cuda:0
hf_dtype: bfloat16
hf_trust_remote_code: 1

# ===== vLLM =====
use_vllm: 1
vllm_gpu_memory_utilization: 0.9
vllm_max_model_len: 4096
vllm_dtype: bfloat16
vllm_tensor_parallel_size: 1
vllm_enforce_eager: 0
vllm_trust_remote_code: 0
vllm_disable_log_stats: 1
gen_batch_size: 64   # 新增：批量生成

# ===== params =====
max_new_tokens: 512
min_new_tokens: 0
do_sample: 1
temperature: 0.8
top_p: 0.95
top_k: 0
num_beams: 1
repetition_penalty: 1.0
no_repeat_ngram_size: 0
return_full_text: 1
seed: 114514

# When you use API to generate examples
api_model: null
api_key: null
api_base: null
api_endpoint: chat
api_timeout: 120

metric_ppl: 0
ppl_model: gpt2
ppl_device: cuda:0
ppl_dtype: auto
ppl_stride: 256
ppl_max_length: 1024

metric_readability: 0

metric_bertscore: 0
bertscore_model: roberta-large
bertscore_device: cuda:0
bertscore_lang: en
bertscore_batch_size: 8
bertscore_rescale: 1

attack_dataset_only: 0
only_attack_machine: 1
machine_label: 1
sample_k: null
