  # dataset_name: squad
  truncate_ratio: 0.5
  regen_number: 10
  max_length: 512
  min_length_pubmed: 50
  min_length_non_pubmed: 150
  do_top_k: false
  top_k: 40
  do_top_p: false
  top_p: 0.96
  temperature: 1.0
  device: 'cuda:0'
  use_bfloat16: true
  calibrator_path: calibration_results/
  calibrator_name: platt_lr
  auto_calibrate: false
  force_runner_calibration: false
