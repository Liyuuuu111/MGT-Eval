detector: npr
data: data/arxiv.qwen3_4b.test.jsonl
# model1 for score, model2 for mask
model1: EleutherAI/gpt-neo-125m
model2: google-t5/t5-small
batch_size: 8
threshold: 0.5
seed: 114514
sample_k: 2000
device: 'cuda:0'
bf16: true
out: 'runs/<detector>'
save_curves: true
no_progress: false
k_runs: 1
detector_kwargs:
  # score_model: EleutherAI/gpt-neo-125m
  # mask_model: EleutherAI/gpt-neo-125m
  pct_words_masked: 0.3
  span_length: 2
  n_perturbation: 10
  chunk_size: 20
  buffer_size: 1
  mask_top_p: 1.0
  max_len: 512
  device: 'cuda:0'
  use_bfloat16: true
  calibrator_path: calibration_results/
  calibrator_name: platt_lr
  auto_calibrate: false
  force_runner_calibration: false
