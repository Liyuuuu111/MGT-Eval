detector: dnadetectllm
data: data/arxiv.qwen3_4b.test.jsonl
# observer_model for model1, performer_model for model2
model1: EleutherAI/gpt-neo-125m
model2: EleutherAI/gpt-neo-125m
batch_size: 8
threshold: 0.5
seed: 114514
sample_k: 2000
device: 'cuda:0'
bf16: true
out: 'runs/dnadetectllm'
save_curves: true
no_progress: false
k_runs: 1
detector_kwargs:
  # observer_model: EleutherAI/gpt-neo-125m
  # performer_model: EleutherAI/gpt-neo-125m
  max_token_observed: 512
  mode: low-fpr
  use_bfloat16: true
  # prob_slope: -6.0
  device: 'cuda:0'
  calibrator_path: calibration_results/
  calibrator_name: platt_lr
  auto_calibrate: false
  force_runner_calibration: false
