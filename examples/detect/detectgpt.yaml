detector: detectgpt
data: data/arxiv.qwen3_4b.test.jsonl
# score model for model1, mask model for model2
model1: EleutherAI/gpt-neo-125m
model2: google-t5/t5-small
batch_size: 8
threshold: 0.5
seed: 114514
sample_k: 2000
device: 'cuda:0'
bf16: true
out: 'runs/detectgpt'
save_curves: true
no_progress: false
k_runs: 1
detector_kwargs:
  # score_model: EleutherAI/gpt-neo-125m
  # mask_model: google-t5/t5-small
  pct_words_masked: 0.3
  span_length: 2
  n_perturbations: 10    # higher perturbations indicate higher performance
  buffer_size: 1
  mask_top_p: 1.0
  use_bfloat16: true
  max_token_observed: 512
  use_zscore: false
  # prob_slope: 8.0
  device: 'cuda:0'
  chunk_size: 20
  eval_max_tokens: 512
  perturb_max_tokens: 512
  calibrator_path: calibration_results/
  calibrator_name: platt_lr
  auto_calibrate: false
  force_runner_calibration: false
