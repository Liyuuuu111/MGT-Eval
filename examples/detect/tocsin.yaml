detector: tocsin
data: data/arxiv.qwen3_4b.test.jsonl
# model1 for score, model2 for reference
model1: EleutherAI/gpt-neo-125m
model2: EleutherAI/gpt-neo-125m
batch_size: 8
threshold: 0.5
seed: 114514
sample_k: 2000
device: 'cuda:0'
bf16: true
out: 'runs/tocsin'
save_curves: true
no_progress: false
k_runs: 1
detector_kwargs:
  # score_model: EleutherAI/gpt-neo-125m
  # reference_model: EleutherAI/gpt-neo-125m
  # basemodel: choices=["Fast", "lrr", "likelihood", "logrank", "standalone"]
  basemodel: Fast
  max_token_observed: 512
  mask_pct: 0.015
  perturb_per_text: 10
  bart_checkpoint: facebook/bart-base
  # dataset_file: null
  device: 'cuda:0'
  use_bfloat16: true
  calibrator_path: calibration_results/
  calibrator_name: platt_lr
  auto_calibrate: false
  force_runner_calibration: false
